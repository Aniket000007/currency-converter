<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CurrencyLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8f135;
      --accent2: #35f1c8;
      --text: #e8e8f0;
      --muted: #555570;
      --error: #ff5566;
      --card: #16161f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* ── Header ── */
    header {
      width: 100%; max-width: 640px; padding: 2.5rem 2rem 0;
      position: relative; z-index: 1;
    }
    .logo {
      font-size: 1.1rem; font-weight: 800; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent);
    }
    .logo span { color: var(--text); }
    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800;
      line-height: 1.05; margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--text) 30%, var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* ── Main card ── */
    main {
      width: 100%; max-width: 640px; padding: 1.5rem 2rem 4rem;
      position: relative; z-index: 1;
    }

    /* ── Currency inputs ── */
    .currency-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 0.75rem; align-items: end; margin-top: 2rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    input[type="text"] {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 1.4rem; font-weight: 500; letter-spacing: 0.05em;
      padding: 0.75rem 1rem; border-radius: 8px;
      text-transform: uppercase; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,241,53,0.1);
    }
    input[type="text"]::placeholder { color: var(--muted); font-size: 1rem; }

    .swap-btn {
      background: var(--border); border: none; cursor: pointer;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1.1rem;
      transition: background 0.2s, color 0.2s, transform 0.3s;
      margin-bottom: 2px;
    }
    .swap-btn:hover { background: var(--accent); color: var(--bg); transform: rotate(180deg); }

    /* ── Scan button ── */
    .scan-btn {
      width: 100%; margin-top: 1.25rem; padding: 1rem;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 1rem;
      font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    }
    .scan-btn:hover {
      box-shadow: 0 0 30px rgba(200,241,53,0.3);
      transform: translateY(-1px);
    }
    .scan-btn:active { transform: scale(0.98); }
    .scan-btn svg { flex-shrink: 0; }

    /* ── Camera section ── */
    #camera-section {
      display: none; margin-top: 1.5rem;
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; position: relative; background: #000;
    }
    #camera-section.active { display: block; }

    #video {
      width: 100%; display: block;
      border-radius: 16px 16px 0 0;
    }

    /* Scanning frame overlay */
    .scan-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60%; aspect-ratio: 1.586/1; /* credit card ratio */
      border: 2px solid var(--accent);
      border-radius: 8px; pointer-events: none;
    }
    .scan-frame::before, .scan-frame::after {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent2); border-style: solid;
    }
    .scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .scan-frame::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    /* Scan line animation */
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanline 2s ease-in-out infinite;
    }
    @keyframes scanline {
      0%   { top: 15%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 85%; opacity: 0; }
    }

    /* Camera controls bar */
    .camera-controls {
      background: var(--card); padding: 0.85rem 1rem;
      display: flex; gap: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .cam-btn {
      flex: 1; padding: 0.65rem; border-radius: 8px; border: none;
      cursor: pointer; font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .cam-btn.capture {
      background: var(--accent); color: var(--bg);
    }
    .cam-btn.capture:hover { box-shadow: 0 0 20px rgba(200,241,53,0.25); }
    .cam-btn.cancel {
      background: var(--border); color: var(--muted);
    }
    .cam-btn.cancel:hover { color: var(--text); }

    /* ── Result overlay ── */
    #result-card {
      display: none; margin-top: 1.5rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }
    #result-card.visible { display: block; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      padding: 1rem 1.25rem 0.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .result-status {
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      background: rgba(200,241,53,0.12); color: var(--accent);
      padding: 2px 8px; border-radius: 999px; letter-spacing: 0.06em;
    }

    .result-body { padding: 0.5rem 1.25rem 1.25rem; }
    .detected-amount {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem;
    }
    .detected-amount strong { color: var(--text); }

    .conversion-display {
      display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap;
    }
    .from-val {
      font-size: 1.5rem; font-weight: 700; color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .arrow { color: var(--muted); font-size: 1.2rem; }
    .to-val {
      font-size: 2.5rem; font-weight: 800; color: var(--accent);
      font-family: 'DM Mono', monospace;
      text-shadow: 0 0 30px rgba(200,241,53,0.25);
    }

    .rate-row {
      margin-top: 0.75rem; padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .rate-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; color: var(--muted);
    }
    .rate-tag strong { color: var(--accent2); }
    .refresh-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--muted); font-size: 0.72rem; font-family: 'DM Mono', monospace;
      padding: 4px 10px; border-radius: 6px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Preview thumbnail ── */
    #preview-thumb {
      display: none; margin-top: 1rem;
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    #preview-thumb img {
      width: 100%; display: block; border-radius: 10px; opacity: 0.7;
    }
    #preview-thumb .thumb-label {
      position: absolute; bottom: 8px; left: 8px;
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      background: rgba(0,0,0,0.7); color: var(--accent);
      padding: 3px 8px; border-radius: 4px; letter-spacing: 0.08em;
    }

    /* ── Error ── */
    .error-msg {
      margin-top: 1rem; padding: 0.85rem 1rem;
      background: rgba(255,85,102,0.08); border: 1px solid rgba(255,85,102,0.25);
      border-radius: 10px; color: var(--error);
      font-family: 'DM Mono', monospace; font-size: 0.8rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Loading ── */
    .loading-state {
      display: none; margin-top: 1.5rem; text-align: center; padding: 2rem;
    }
    .loading-state.active { display: block; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 1rem;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--muted); letter-spacing: 0.08em;
    }

    /* ── Amount input ── */
    .amount-row {
      margin-top: 1rem;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .amount-hint {
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      color: var(--muted); letter-spacing: 0.05em;
    }
    input[type="number"] {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 1rem; padding: 0.6rem 1rem; border-radius: 8px;
      outline: none; width: 160px;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0; }

    canvas { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">Currency<span>Lens</span></div>
  <h1>Point &amp; Convert</h1>
  <p class="subtitle">// scan any banknote → instant rate overlay</p>
</header>

<main>

  <!-- Currency selectors -->
  <div class="currency-row">
    <div class="field">
      <label>From Currency</label>
      <input type="text" id="from-currency" maxlength="3" placeholder="USD" value="USD" />
    </div>
    <button class="swap-btn" onclick="swapCurrencies()" title="Swap">⇄</button>
    <div class="field">
      <label>To Currency</label>
      <input type="text" id="to-currency" maxlength="3" placeholder="INR" value="INR" />
    </div>
  </div>

  <!-- Optional manual amount -->
  <div class="amount-row">
    <label>Amount <span class="amount-hint">(leave blank to detect from camera)</span></label>
    <input type="number" id="amount" placeholder="e.g. 100" min="0" step="any" />
  </div>

  <!-- Open Camera -->
  <button class="scan-btn" onclick="startCamera()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Open Camera & Scan
  </button>

  <!-- Camera viewport -->
  <div id="camera-section">
    <div style="position:relative;">
      <video id="video" autoplay playsinline></video>
      <div class="scan-frame"><div class="scan-line"></div></div>
    </div>
    <div class="camera-controls">
      <button class="cam-btn cancel" onclick="stopCamera()">✕ Cancel</button>
      <button class="cam-btn capture" onclick="capture()">📸 Capture &amp; Convert</button>
    </div>
  </div>

  <!-- Captured thumbnail -->
  <div id="preview-thumb">
    <img id="thumb-img" src="" alt="Captured" />
    <div class="thumb-label">CAPTURED FRAME</div>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <p>FETCHING EXCHANGE RATE...</p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Result card -->
  <div id="result-card">
    <div class="result-header">
      <span class="result-label">Conversion Result</span>
      <span class="result-status">LIVE RATE</span>
    </div>
    <div class="result-body">
      <div class="detected-amount" id="detected-info"></div>
      <div class="conversion-display">
        <span class="from-val" id="from-val"></span>
        <span class="arrow">→</span>
        <span class="to-val" id="to-val"></span>
      </div>
      <div class="rate-row">
        <span class="rate-tag">1 <span id="rate-from"></span> = <strong id="rate-val"></strong> <span id="rate-to"></span></span>
        <button class="refresh-btn" onclick="fetchAndShow()">↻ Refresh</button>
      </div>
    </div>
  </div>

</main>

<canvas id="canvas"></canvas>

<script>
const BACKEND_SCAN_URL = 'https://currency-converter-xy45.onrender.com/api/scan';

let stream = null;
let scanInterval = null;
let isProcessing = false;

let lastDetected = null;
let lastUpdate = 0;

// ── START CAMERA ─────────────────────────
async function startCamera() {
  clearResult();

  const from = document.getElementById('from-currency').value.trim();
  const to   = document.getElementById('to-currency').value.trim();

  if (!from || !to || from.length !== 3 || to.length !== 3) {
    showError('Please enter valid 3-letter currency codes.');
    return;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });

    const video = document.getElementById('video');
    video.srcObject = stream;

    document.getElementById('camera-section').classList.add('active');

    startAutoScan();

  } catch (e) {
    showError('Camera access denied.');
  }
}

// ── STOP CAMERA ─────────────────────────
function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  if (scanInterval) {
    clearInterval(scanInterval);
    scanInterval = null;
  }

  document.getElementById('camera-section').classList.remove('active');
}

// ── AUTO SCAN LOOP ──────────────────────
function startAutoScan() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  scanInterval = setInterval(async () => {

    if (isProcessing || !video.videoWidth) return;
    isProcessing = true;

    try {
      const ctx = canvas.getContext('2d');

      // Resize for performance
      const targetWidth = 640;
      const scale = targetWidth / video.videoWidth;

      canvas.width  = targetWidth;
      canvas.height = video.videoHeight * scale;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve =>
        canvas.toBlob(resolve, 'image/jpeg', 0.7)
      );

      const formData = new FormData();
      formData.append("file", blob);
      formData.append("from", document.getElementById("from-currency").value);
      formData.append("to", document.getElementById("to-currency").value);

      const res = await fetch(BACKEND_SCAN_URL, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      console.log("SCAN RESPONSE:", data);

      // ✅ Directly use scan response (no convert API)
      if (data.amount && data.convertedAmount) {

        // prevent duplicate UI updates
        if (data.amount === lastDetected) {
          isProcessing = false;
          return;
        }

        // simple debounce (avoid flicker)
        if (Date.now() - lastUpdate < 1500) {
          isProcessing = false;
          return;
        }

        lastDetected = data.amount;
        lastUpdate = Date.now();

        showResult(data);
      }

    } catch (e) {
      console.error("Scan failed", e);
    } finally {
      isProcessing = false;
    }

  }, 2000);
}

// ── SHOW RESULT ─────────────────────────
function showResult(data) {
  if (!data || !data.convertedAmount) {
    showError("Invalid response from backend");
    return;
  }

  console.log("Rendering UI:", data);

  document.getElementById('detected-info').innerHTML =
    `Detected amount: <strong>${data.amount} ${data.from}</strong>`;

  document.getElementById('from-val').textContent =
    `${data.amount} ${data.from}`;

  document.getElementById('to-val').textContent =
    `${data.convertedAmount.toFixed(2)} ${data.to}`;

  // Optional rate calculation
  const rate = data.convertedAmount / data.amount;

  document.getElementById('rate-from').textContent = data.from;
  document.getElementById('rate-val').textContent  = rate.toFixed(4);
  document.getElementById('rate-to').textContent   = data.to;

  document.getElementById('result-card').classList.add('visible');
}

// ── SWAP ───────────────────────────────
function swapCurrencies() {
  const f = document.getElementById('from-currency');
  const t = document.getElementById('to-currency');
  [f.value, t.value] = [t.value, f.value];
}

// ── HELPERS ────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}

function clearResult() {
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('error-msg').classList.remove('visible');
}

// ── AUTO UPPERCASE ─────────────────────
['from-currency', 'to-currency'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
  });
});
</script>
</body>
</html>
